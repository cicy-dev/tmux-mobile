services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    volumes:
      - ./server/src:/app/src:ro
      - ./server/package.json:/app/package.json:ro
      - /app/node_modules
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/personal:/root/personal:ro
    environment:
      - NODE_ENV=development
      - PORT=6901
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "6901:6901"
    command: npx tsx watch src/index.ts
    restart: unless-stopped
    network_mode: host
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/index.html:/app/index.html:ro
      - ./frontend/vite.config.ts:/app/vite.config.ts:ro
      - ./frontend/tailwind.config.js:/app/tailwind.config.js:ro
      - ./frontend/postcss.config.js:/app/postcss.config.js:ro
      - ./frontend/.env:/app/.env:ro
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=https://g-fast-api.cicy.de5.net
      - VITE_TTYD_URL=https://g-ttyd-api.cicy.de5.net
    ports:
      - "16901:16901"
    depends_on:
      - server
    command: npm run dev
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>---</title>
    <style>
      /* Global scrollbar styling */
      *::-webkit-scrollbar { width: 6px; height: 6px; }
      *::-webkit-scrollbar-track { background: #1e1e1e; }
      *::-webkit-scrollbar-thumb { background: #474747; border-radius: 3px; }
      *::-webkit-scrollbar-thumb:hover { background: #858585; }
      
      /* Hide xterm scrollbar */
      .xterm .xterm-viewport::-webkit-scrollbar { width: 0 !important; height: 0 !important; display: none !important; }
      .xterm .xterm-viewport { scrollbar-width: none !important; -ms-overflow-style: none !important; }
    </style>
  </head>
  <body style="background-color: #1e1e1e; color: #cccccc;" class="overflow-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
